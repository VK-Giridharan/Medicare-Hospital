<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare Plus | Premium Healthcare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ================= ROOT ================= */

:root{
--primary:#009688;
--secondary:#004d40;
--white:#fff;
--dark:#222;
--transition:all .4s ease;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:#f4f9f9;overflow-x:hidden;}

/* ================= HEADER ================= */

.header{
position:fixed;
top:0;
width:100%;
background:white;
z-index:1000;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 6%;
}

.logo{
display:flex;
align-items:center;
font-family:'Poppins',sans-serif;
font-size:1.7rem;
font-weight:700;
color:var(--primary);
gap:10px;
}

.logo i{
color:#e63946;
font-size:1.6rem;
}

.nav-menu{
display:flex;
gap:35px;
list-style:none;
}

.nav-link{
position:relative;
font-weight:500;
font-size:1rem;
color:#333;
transition:.3s;
padding-bottom:5px;
text-decoration:none;
}

.nav-link::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:var(--primary);
transition:.3s;
}

.nav-link:hover{
color:var(--primary);
}

.nav-link:hover::after{
width:100%;
}

.btn{
background:var(--primary);
color:white;
padding:10px 22px;
border-radius:4px;
font-weight:500;
transition:.3s;
text-decoration:none;
}

.btn:hover{
background:var(--secondary);
}

.hamburger{display:none;cursor:pointer;}
.bar{width:25px;height:3px;background:#333;margin:5px;}

/* ================= HERO ================= */

.hero{
height:calc(100vh - 80px);
margin-top:80px;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1200&q=80') center/cover;
overflow:hidden;
}

.slider{
position:relative;
width:100%;
max-width:1000px;
height:500px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity .8s ease;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
transform:scale(1.2);
transition:transform 6s ease;
}

.slide.active{
opacity:1;
z-index:2;
}

.slide.active img{
transform:scale(1);
}

.slide-content{
position:absolute;
bottom:0;
width:100%;
padding:40px;
background:linear-gradient(transparent,rgba(0,0,0,.8));
color:white;
transform:translateY(40px);
opacity:0;
transition:var(--transition);
}

.slide.active .slide-content{
transform:translateY(0);
opacity:1;
}

/* ================= SLIDER BUTTONS ================= */

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:55px;
height:55px;
border-radius:50%;
background:rgba(0,0,0,0.6);
border:none;
color:white;
cursor:pointer;
font-size:1.3rem;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
transition:.3s;
}

.nav-btn:hover{
background:var(--primary);
}

.prev{left:15px;}
.next{right:15px;}

/* DOTS */

.dots{
position:absolute;
bottom:-45px;
width:100%;
display:flex;
justify-content:center;
gap:12px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:#ccc;
cursor:pointer;
transition:.3s;
}

.dot.active{
background:var(--primary);
transform:scale(1.3);
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.nav-menu{
position:fixed;
top:80px;
left:-100%;
flex-direction:column;
background:white;
width:100%;
height:100vh;
padding-top:30px;
transition:.3s;
}
.nav-menu.active{left:0;}
.hamburger{display:block;}
.prev,.next{display:none;}
}

</style>
</head>
<body>

<header class="header">
<nav class="navbar">

<div class="logo">
<i class="fas fa-heart-pulse"></i>
MediCarePlus
</div>

<ul class="nav-menu">
<li><a href="index.html" class="nav-link">Home</a></li>
<li><a href="speciality.html" class="nav-link">Speciality</a></li>
<li><a href="facilities.html" class="nav-link">Facilities</a></li>
<li><a href="departments.html" class="nav-link">Departments</a></li>
<li><a href="contact.html" class="nav-link">Contact</a></li>
</ul>



<div class="hamburger" aria-label="Toggle Menu">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</nav>
</header>

<section class="hero" id="home">
<div class="slider">

<button class="nav-btn prev" aria-label="Previous Slide">
<i class="fas fa-chevron-left"></i>
</button>

<div class="slide active">
<img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1200&q=80" alt="World class hospital interior" loading="lazy">
<div class="slide-content">
<h2>World Class Care</h2>
<p>Advanced technology with compassion</p>
</div>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=1200&q=80" alt="24 hour emergency care unit" loading="lazy">
<div class="slide-content">
<h2>24/7 Emergency</h2>
<p>Immediate critical care services</p>
</div>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1581056771107-24ca5f033842?auto=format&fit=crop&w=1200&q=80" alt="Professional surgeons performing operation" loading="lazy">
<div class="slide-content">
<h2>Expert Surgeons</h2>
<p>Globally certified professionals</p>
</div>
</div>

<button class="nav-btn next" aria-label="Next Slide">
<i class="fas fa-chevron-right"></i>
</button>

<div class="dots"></div>

</div>
</section>

<script>

/* NAV TOGGLE */
const hamburger=document.querySelector(".hamburger");
const navMenu=document.querySelector(".nav-menu");

if(hamburger){
hamburger.addEventListener("click",()=>{
navMenu.classList.toggle("active");
});
}

/* Close mobile menu on link click */
document.querySelectorAll(".nav-link").forEach(link=>{
link.addEventListener("click",()=>{
navMenu.classList.remove("active");
});
});

/* SLIDER */
const slides=document.querySelectorAll(".slide");
const prevBtn=document.querySelector(".prev");
const nextBtn=document.querySelector(".next");
const dotsContainer=document.querySelector(".dots");

let current=0;
let autoSlide;

/* CREATE DOTS */
slides.forEach((_,i)=>{
let dot=document.createElement("div");
dot.classList.add("dot");
if(i===0)dot.classList.add("active");
dot.addEventListener("click",()=>goToSlide(i));
dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll(".dot");

function updateSlides(){
slides.forEach(slide=>slide.classList.remove("active"));
dots.forEach(dot=>dot.classList.remove("active"));
slides[current].classList.add("active");
dots[current].classList.add("active");
}

function nextSlide(){
current=(current+1)%slides.length;
updateSlides();
}

function prevSlide(){
current=(current-1+slides.length)%slides.length;
updateSlides();
}

function goToSlide(index){
current=index;
updateSlides();
}

if(nextBtn && prevBtn){
nextBtn.addEventListener("click",nextSlide);
prevBtn.addEventListener("click",prevSlide);
}

function startAuto(){
stopAuto();
autoSlide=setInterval(nextSlide,5000);
}

function stopAuto(){
clearInterval(autoSlide);
}

startAuto();

const slider=document.querySelector(".slider");

slider.addEventListener("mouseenter",stopAuto);
slider.addEventListener("mouseleave",startAuto);

/* KEYBOARD SUPPORT */
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight") nextSlide();
if(e.key==="ArrowLeft") prevSlide();
});

/* SWIPE */
let startX=0;

slider.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

slider.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
let diff=startX-endX;
if(diff>50) nextSlide();
if(diff<-50) prevSlide();
});

</script>

</body>
</html>
