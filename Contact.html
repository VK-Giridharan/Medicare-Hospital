<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Write Us | ME Hospital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container my-5">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Contact / Write Us</h2>
            <p class="text-muted">We are here to help you 24/7</p>
        </div>

        <!-- NAVIGATION TABS -->
        <ul class="nav nav-pills justify-content-center mb-4">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#enquiry">Enquiry</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#suggestion">Suggestion</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#grievance">Grievance</button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- COMMON FORM -->
            <div class="tab-pane fade show active" id="enquiry">
                <form id="contactForm">

                    <input type="hidden" id="type" value="Enquiry">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Patient Name</label>
                            <input type="text" id="name" class="form-control">
                            <small class="text-danger" id="nameError"></small>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Email Address</label>
                            <input type="text" id="email" class="form-control">
                            <small class="text-danger" id="emailError"></small>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Contact Number</label>
                            <input type="text" id="mobile" class="form-control">
                            <small class="text-danger" id="mobileError"></small>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Location</label>
                            <select id="location" class="form-select">
                                <option value="">Select Location</option>
                                <option>Madurai</option>
                                <option>Chennai</option>
                                <option>Coimbatore</option>
                                <option>Trichy</option>
                            </select>
                            <small class="text-danger" id="locationError"></small>
                        </div>

                        <div class="col-12 mb-3">
                            <label>Message</label>
                            <textarea id="message" class="form-control" rows="4"></textarea>
                            <small class="text-danger" id="messageError"></small>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="button" onclick="submitForm()" class="btn btn-success px-4">
                            Submit & Send via WhatsApp
                        </button>
                    </div>

                </form>
            </div>

            <!-- Suggestion -->
            <div class="tab-pane fade" id="suggestion">
                <script>
                    document.addEventListener("DOMContentLoaded", function () {
                        document.querySelector('[data-bs-target="#suggestion"]').addEventListener("click", function () {
                            document.getElementById("type").value = "Suggestion";
                        });
                    });
                </script>
                <div class="alert alert-info text-center">
                    Use the same form to submit your suggestion.
                </div>
            </div>

            <!-- Grievance -->
            <div class="tab-pane fade" id="grievance">
                <div class="alert alert-danger text-center">
                    Use the same form to register grievance.
                </div>
            </div>

        </div>

        <!-- HOSPITAL CONTACT INFO -->
        <div class="mt-5 p-4 bg-light rounded shadow-sm">
            <h5 class="text-primary">Appointments & General Enquiry</h5>
            <p><strong>Phone:</strong> +91 9876543210</p>
            <p><strong>Email:</strong> support@mehospitals.com</p>
        </div>

        <!-- GOOGLE MAP -->
        <div class="mt-4">
            <iframe src="https://www.google.com/maps?q=Madurai&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%"
                height="300" style="border:0;" allowfullscreen loading="lazy">
            </iframe>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/writeus.js"></script>
</body>

</html>
