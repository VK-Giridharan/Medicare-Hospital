<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | MediCare Plus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<!-- UPDATED FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
--primary:#009688;
--secondary:#004d40;
}

body{
font-family:'Roboto',sans-serif;
background:#f4f9f9;
margin:0;
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
background:white;
z-index:1000;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 6%;
}

.logo{
display:flex;
align-items:center;
font-family:'Poppins',sans-serif;
font-size:1.7rem;
font-weight:700;
color:var(--primary);
gap:10px;
}

.logo i{
color:#e63946;
font-size:1.6rem;
}

.nav-menu{
display:flex;
align-items:center;
gap:35px;
list-style:none;
margin:0;
}

.nav-link{
position:relative;
font-weight:500;
font-size:1rem;
color:#333;
text-decoration:none;
padding-bottom:5px;
}

.nav-link::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:var(--primary);
transition:.3s;
}

.nav-link:hover{
color:var(--primary);
}

.nav-link:hover::after{
width:100%;
}

.nav-link.active{
color:var(--primary);
}

.nav-link.active::after{
width:100%;
}

.hamburger{
display:none;
cursor:pointer;
}

.bar{
width:25px;
height:3px;
background:#333;
margin:5px;
}

/* MOBILE */

@media(max-width:768px){

.nav-menu{
position:fixed;
top:80px;
left:-100%;
flex-direction:column;
background:white;
width:100%;
height:100vh;
padding-top:30px;
transition:.3s;
}

.nav-menu.active{
left:0;
}

.hamburger{
display:block;
}

}

/* PAGE */

.page-container{
margin-top:120px;
}

/* SOCIAL ICONS */

.social-icons a{
font-size:22px;
margin-right:15px;
color:var(--primary);
text-decoration:none;
}

.social-icons a:hover{
color:#004d40;
}
</style>

</head>

<body>

<header class="header">

<nav class="navbar">

<div class="logo">
<i class="fas fa-heart-pulse"></i>
MediCarePlus
</div>

<ul class="nav-menu">

<li><a href="index.html" class="nav-link">Home</a></li>
<li><a href="specialities.html" class="nav-link">Specialities</a></li>
<li><a href="facilities.html" class="nav-link">Facilities</a></li>
<li><a href="departments.html" class="nav-link">Departments</a></li>
<li><a href="about.html" class="nav-link">About Us</a></li>
<li><a href="Contact.html" class="nav-link active">Contact</a></li>

</ul>

<div class="hamburger">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</nav>

</header>


<!-- CONTACT PAGE -->

<div class="container page-container">

<form id="contactForm">

<div class="row">

<div class="col-12 mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="col-12 mb-3">
<label>Email Address</label>
<input type="email" id="email" class="form-control">
</div>

<div class="col-12 mb-3">
<label>Contact Number</label>
<input type="text" id="mobile" class="form-control">
</div>

<div class="col-12 mb-3">

<label>Location</label>

<select id="location" class="form-select">

<option value="">Select Location</option>
<option>Madurai</option>
<option>Chennai</option>
<option>Coimbatore</option>
<option>Trichy</option>

</select>

</div>

<div class="col-12 mb-3">
<label>Message</label>
<textarea id="message" class="form-control" rows="4"></textarea>
</div>

</div>

</form>


<!-- CONTACT INFO -->

<div class="mt-5 p-4 bg-light rounded shadow-sm">

<h5 class="text-primary">Contact Information</h5>

<p>
<i class="fas fa-phone"></i>
<strong>Phone:</strong> +91 9876543210
</p>

<p>
<i class="fas fa-envelope"></i>
<strong>Email:</strong> support@mehospitals.com
</p>

<div class="social-icons mt-3">

<a href="https://wa.me/919876543210" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<a href="https://www.instagram.com" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://x.com" target="_blank">
<i class="fa-brands fa-x-twitter"></i>
</a>

<a href="https://www.facebook.com" target="_blank">
<i class="fab fa-facebook"></i>
</a>

</div>

</div>


<!-- GOOGLE MAP -->

<div class="mt-4">

<iframe src="https://www.google.com/maps?q=Madurai&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%"
height="300"
style="border:0;"
allowfullscreen
loading="lazy"></iframe>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* MOBILE MENU */

const hamburger=document.querySelector(".hamburger");
const navMenu=document.querySelector(".nav-menu");

hamburger.addEventListener("click",()=>{
navMenu.classList.toggle("active");
});

document.querySelectorAll(".nav-link").forEach(link=>{
link.addEventListener("click",()=>{
navMenu.classList.remove("active");
});
});

</script>

</body>
</html>
